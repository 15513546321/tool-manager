<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interface Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      /* Excel HTML Preview Styling */
      .preview-content table {
        border-collapse: collapse;
        width: 100%;
        margin-bottom: 1rem;
      }
      .preview-content th, .preview-content td {
        border: 1px solid #cbd5e1;
        padding: 0.5rem;
        text-align: left;
      }
      .preview-content th {
        background-color: #f1f5f9;
        font-weight: 600;
      }
    </style>
  <!-- Note: When running with Vite (npm run dev), the importmap is often replaced by node_modules imports.
       However, we keep it here for standalone capability if needed, though package.json usage implies node_modules. -->

{
  "imports": {
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.556.0",

    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.10.1",
    "xlsx": "https://esm.sh/xlsx@0.18.5",
    "mammoth": "https://esm.sh/mammoth@1.6.0",
    "diff": "https://esm.sh/diff@5.1.0",
    "jszip": "https://esm.sh/jszip@3.10.1",
    "vite": "https://aistudiocdn.com/vite@^7.2.7",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
