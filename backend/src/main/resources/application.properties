# ============================================================
# Application & Server Configuration (\u5E94\u7528\u4E0E\u670D\u52A1\u5668\u914D\u7F6E)
# ============================================================
spring.application.name=tool-manager-backend
server.port=8080
server.servlet.context-path=/

# ============================================================
# Datasource Configuration (\u6570\u636E\u6E90\u914D\u7F6E - H2 \u6570\u636E\u5E93)
# ============================================================
# H2 \u6587\u4EF6\u6570\u636E\u5E93\u8FDE\u63A5 URL
# MODE=MySQL: \u517C\u5BB9 MySQL \u6A21\u5F0F
# DB_CLOSE_DELAY=-1: \u865A\u62DF\u673A\u8FD0\u884C\u671F\u95F4\u4FDD\u6301\u6570\u636E\u5E93\u5F00\u542F
# INIT=...: \u521D\u59CB\u5316\u521B\u5EFA PUBLIC schema
spring.datasource.url=jdbc:h2:file:/home/zhangqing/project/tool-manager_new/data/toolmanager;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS PUBLIC;TRACE_LEVEL_SYSTEM_OUT=0
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================================
# H2 Console Configuration (H2 \u63A7\u5236\u53F0\u914D\u7F6E)
# ============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
spring.h2.console.settings.trace=true
spring.h2.console.settings.remote-connect=true
h2.tcp.enabled=true

# ============================================================
# H2 Database Connection Examples (\u6570\u636E\u5E93\u8FDE\u63A5\u793A\u4F8B)
# ============================================================
# 1. \u672C\u5730/\u5D4C\u5165\u5F0F\u8FDE\u63A5 (Spring Boot \u5185\u90E8\u4F7F\u7528):
#    jdbc:h2:file:/home/zhangqing/project/tool-manager_new/data/toolmanager;MODE=MySQL
#
# 2. TCP \u8FDC\u7A0B\u8FDE\u63A5 (DBeaver/DataGrip \u7B49\u5DE5\u5177\u4F7F\u7528):
#    \u524D\u63D0: h2.tcp.enabled=true \u4E14\u5E94\u7528\u6B63\u5728\u8FD0\u884C
#    URL: jdbc:h2:tcp://localhost:9092/file:/home/zhangqing/project/tool-manager_new/data/toolmanager;MODE=MySQL
#    User: sa
#    Password: (\u7A7A)

# ============================================================
# JPA / Hibernate (ORM \u6846\u67B6\u914D\u7F6E)
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# SQL \u521D\u59CB\u5316\u811A\u672C (\u6309\u987A\u5E8F\u6267\u884C\uFF0C\u786E\u4FDD\u8868\u5148\u521B\u5EFA\uFF0C\u518D\u521D\u59CB\u5316\u6570\u636E)
spring.sql.init.mode=always
spring.sql.init.platform=h2
spring.sql.init.data-locations=classpath:schema.sql,classpath:migration.sql,classpath:init-data.sql
spring.sql.init.continue-on-error=false

# ============================================================
# CORS for front-end (\u8DE8\u57DF\u4E0E\u4F1A\u8BDD\u914D\u7F6E)
# ============================================================
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=false

# ============================================================
# Logging Configuration (\u65E5\u5FD7\u914D\u7F6E)
# ============================================================
# \u65E5\u5FD7\u7EA7\u522B\u8BF4\u660E:
# - ERROR: \u53EA\u8BB0\u5F55\u9519\u8BEF
# - WARN: \u8BB0\u5F55\u8B66\u544A\u548C\u9519\u8BEF
# - INFO: \u8BB0\u5F55\u4FE1\u606F\u3001\u8B66\u544A\u548C\u9519\u8BEF
# - DEBUG: \u8BB0\u5F55\u8C03\u8BD5\u4FE1\u606F\u53CA\u4EE5\u4E0A
# - TRACE: \u8BB0\u5F55\u6240\u6709\u4FE1\u606F\uFF08\u6700\u8BE6\u7EC6\uFF09

# ============================================================
# REST API \u63A5\u53E3\u6267\u884C\u65E5\u5FD7
# ============================================================
# \u663E\u793A Spring MVC \u8BF7\u6C42\u548C\u54CD\u5E94\u4FE1\u606F
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=INFO
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestResponseBodyMethodProcessor=INFO

# \u663E\u793A Spring Security \u8BA4\u8BC1\u548C\u6388\u6743
logging.level.org.springframework.security=INFO

# \u663E\u793A HTTP \u8BF7\u6C42\u7EC6\u8282\uFF08\u53EF\u9009\uFF0C\u4F1A\u5F88\u5197\u957F\uFF09
# logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG

# ============================================================
# \u65E5\u5FD7\u8F93\u51FA\u683C\u5F0F\u914D\u7F6E
# ============================================================
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%-5level] [%thread] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%-5level] [%thread] %logger{36} - %msg%n

logging.level.root=WARN
logging.level.com.toolmanager=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO

# \u65E5\u5FD7\u8F93\u51FA\u5230\u6587\u4EF6\u800C\u4E0D\u662F\u63A7\u5236\u53F0

# \u65E5\u5FD7\u6587\u4EF6\u914D\u7F6E\uFF08\u5F00\u53D1\u73AF\u5883\u53EF\u9009\uFF09
