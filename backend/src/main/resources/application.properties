spring.application.name=tool-manager-backend
server.port=8080
server.servlet.context-path=/

# H2 Database Configuration (文件模式 - 应用同级目录)
# 存储路径: ./data/toolmanager (相对路径) 或 /opt/tool-manager/data/toolmanager (绝对路径)
spring.datasource.url=jdbc:h2:file:./data/toolmanager;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (Optional: enable for debugging at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# CORS for front-end
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=false

# Logging
logging.level.root=INFO
logging.level.com.toolmanager=DEBUG
