# Linux 生产环境配置文件
# 使用方式: java -Dspring.profiles.active=linux -jar app.jar

spring.application.name=tool-manager-backend
server.port=8080
server.servlet.context-path=/

# ============================================
# H2 Database Configuration (Linux 部署优化)
# ============================================
# 方案1: 项目同级目录（推荐）
# spring.datasource.url=jdbc:h2:file:/opt/tool-manager-data/tooldb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# 方案2: 标准系统路径（最推荐）✅
spring.datasource.url=jdbc:h2:file:/var/data/tool-manager/tooldb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (生产环境建议禁用)
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# CORS for front-end
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=false

# Logging (生产环境配置)
logging.level.root=WARN
logging.level.com.toolmanager=INFO
logging.file.name=/var/log/tool-manager/app.log
logging.file.max-size=10MB
logging.file.max-history=30

# Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
